<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 NMTI 职场牛马录用系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --bg-dark: #050505;
            --card-gray: #121212;
            --arco-line-height: 1.6; /* 移动端更宽松的行高 */
        }

        body {
            background-color: var(--bg-dark);
            color: #eee;
            /* 优化字体族，优先系统黑体 */
            font-family: 'Share Tech Mono', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            line-height: var(--arco-line-height);
            -webkit-tap-highlight-color: transparent;
        }

        /* CRT 扫描线特效 - 降低透明度以保护移动端视力 */
        .crt::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .glitch {
            text-shadow: 0.05em 0 0 var(--neon-red), -0.025em -0.05em 0 var(--neon-green), 0.025em 0.05em 0 var(--neon-purple);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 var(--neon-red), -0.025em -0.05em 0 var(--neon-green), 0.025em 0.05em 0 var(--neon-purple); }
            15% { text-shadow: -0.05em -0.025em 0 var(--neon-red), 0.025em 0.025em 0 var(--neon-green), -0.05em -0.05em 0 var(--neon-purple); }
            50% { text-shadow: 0.025em 0.05em 0 var(--neon-red), 0.05em 0 0 var(--neon-green), 0 -0.05em 0 var(--neon-purple); }
            100% { text-shadow: -0.025em 0 0 var(--neon-red), -0.025em -0.025em 0 var(--neon-green), -0.025em -0.05em 0 var(--neon-purple); }
        }

        /* 移动端专用选项按钮 */
        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            text-align: left;
            width: 100%;
            padding: 1.1rem 1.25rem;
            font-size: 1.1rem; 
            border-radius: 6px;
            position: relative;
            transition: all 0.1s ease;
            margin-bottom: 0.75rem;
        }

        /* 移动端点击反馈替代悬停 */
        .option-btn:active {
            background: rgba(188, 19, 254, 0.2);
            border-color: var(--neon-purple);
            transform: scale(0.98);
        }

        .progress-bar { height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--neon-purple); transition: width 0.3s ease; box-shadow: 0 0 10px var(--neon-purple); }

        .analysis-card { background: #0a0a0a; border-left: 3px solid var(--neon-purple); padding: 1.25rem; margin-top: 1rem; border-radius: 0 4px 4px 0; }

        .hidden { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        .scan-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #000 100%);
            z-index: -1;
        }

        /* 响应式排版辅助类 */
        .mobile-title { font-size: 14vw; line-height: 1; }
        @media (min-width: 768px) { .mobile-title { font-size: 72px; } }
    </style>
</head>

        ];

        const resultsMap = {
            'A': { 'B': { title: "搅屎棍本棍", tagline: "ENTP - 混沌逻辑资产", quote: "这个需求我不做，但我能把你忽悠瘸了。", desc: "只要不让你动手干活，你的创意能绕地球三圈。你存在的意义就是让所有人的计划都乱套。" }, 'P': { title: "赛博判官", tagline: "INTJ - 精密架构耗材", quote: "别谈人性，你是来上班还是来找爹的？", desc: "你是最高效的降本增效机器。任何浪费时间的人类活动在你眼里都是系统冗余。" }, 'W': { title: "卷王之王", tagline: "ENTJ - 顶级猎食牛马", quote: "你不干有的是人干，你不死有的是人想让你死。", desc: "你的血液里流淌着KPI。对他人的宽容就是对竞争力的亵渎，你是马厩里唯一的掠食者。" }, 'A': { title: "职场悍匪", tagline: "ESTP - 极速猎食资产", quote: "只要提成够，老板是我舅。", desc: "你不在乎什么企业文化。哪里有收益哪里就有你，干完这票你随时准备跑路。" } },
            'W': { 'W': { title: "流程丧尸", tagline: "ISTJ - 重装规则耗材", quote: "少一根对齐线，我就要跟你同归于尽。", desc: "你已经把灵魂献祭给了Excel和流程图。你是马厩最稳定的齿轮，直到世界尽头你也会按时打卡。" }, 'A': { title: "KPI收割机", tagline: "ESTJ - 目标驱动耗材", quote: "没有完成不了的指标，只有还没累死的吗喽。", desc: "你是老板最得力的监军。不仅对自己狠，对下属的生命体征也持怀疑态度。" }, 'P': { title: "职场义庄领工", tagline: "ISFJ - 全天候背锅圣体", quote: "老板扇我左脸，我会问他手疼不疼。", desc: "你的善良在马厩里显得格格不入。你是最后的屏障，专门收留那些没人要的杂活和黑锅。" }, 'B': { title: "职场居委会", tagline: "ESFJ - 关系缝合单位", quote: "一边听八卦，一边发收到。", desc: "你是马厩的润滑油。哪里有矛盾哪里就有你，哪里有锅你就在哪里保持微笑。" } },
            'P': { 'P': { title: "带薪尸体", tagline: "INTP - 精神脱离资产", quote: "精神已离职，肉体在挂机。", desc: "你已经掌握了跨维度摸鱼技术。身体虽然坐在工位上，但灵魂已经在三体星系流浪。" }, 'W': { title: "职场通灵人", tagline: "INFJ - 深度内耗祭品", quote: "我一眼看穿了底色，还得微笑着修补烂网。", desc: "你看透了一切画饼，但由于道德感太强，依然在深夜默默改着那个没人看的方案。" }, 'B': { title: "内耗冠军", tagline: "INFP - 高敏感易碎吗喽", quote: "老板没发表情包，我想好了孩子埋哪儿。", desc: "你每天都在脑内剧场杀青一百次。工作还没开始，你的精神已经碎成了渣。" }, 'A': { title: "传销头目", tagline: "ENFJ - 梦想窒息引导员", quote: "为了老板的豪车梦想，大家手拉手窒息！", desc: "你擅长用梦想把大家卷在一起。只要你的嗓门够大，大家就忘了结节的存在。" } },
            'B': { 'B': { title: "赛博独行侠", tagline: "ISTP - 逻辑炸弹专家", quote: "再哔哔一句，我就把键盘塞你嗓子眼。", desc: "你眼里没有领导，只有逻辑和工具。活可以干，逼老板最好少装，否则格式化脚本已就绪。" }, 'A': { title: "表演型牛马", tagline: "ESFP - 工位影帝资产", quote: "只要镜头一开，我就是最努力的崽。", desc: "你的工作产出主要集中在朋友圈和PPT效果上。演技是你在马厩里存活的核心科技。" }, 'P': { title: "工位艺术尸", tagline: "ISFP - 极简离线耗材", quote: "表面在做图，实际在神游。", desc: "你拒绝任何洗脑，只在自己的一亩三分地里优雅地腐烂。老板问进度，你就发乱码表情包。" }, 'W': { title: "蹦迪的燃料", tagline: "ENFP - 极度不稳定电池", quote: "上午：我有创意！下午：我要氧气瓶。", desc: "你在“哈哈哈”和“呜呜呜”之间无缝切换。你是工位的气氛组，也是公司消耗最快的电池。" } }
        };

        const dimensionEval = {
            W: [{ r: [0, 30], t: "马厩叛徒", d: "你对规则视若无睹，老板画的饼你甚至想吐在他脸上。" }, { r: [31, 60], t: "搬砖吗喽", d: "你是合格的砖，哪里需要往哪搬。在加班和摸鱼间寻找微光。" }, { r: [61, 90], t: "标准电池", d: "5号电池本池。电量充足时回“收到”，没电时默默挂机。" }, { r: [91, 120], t: "耐磨牛马", d: "已活成公司的呼吸机。哪里有火去哪。建议查DNA，全是SOP。" }, { r: [121, 150], t: "重装圣体", d: "墓志铭建议写“老板手疼不疼”。你的忍耐力跨越了人类极限。" }],
            P: [{ r: [0, 30], t: "实心吗喽", d: "你竟然真的在工作？你的纯真在2026年简直是职场活化石。" }, { r: [31, 60], t: "业余神游", d: "掌握初级摸鱼。身体在工位灵魂在出逃，老板咳嗽你会瞬间上线。" }, { r: [61, 90], t: "半透明社畜", d: "薛定谔的办公。还没离职纯粹是因为余额在强行维持肉体形态。" }, { r: [91, 120], t: "数字幽灵", d: "除非发工资，否则公司察觉不到你。坐在老板对面他只会觉得空气忧郁。" }, { r: [121, 150], t: "量子奇点", d: "精神已在三体投胎。只要你不尴尬，尴尬的就是老板。" }],
            A: [{ r: [0, 30], t: "深海咸鱼", d: "权力对你是负担。在卷王眼里，你甚至不配作为一个分母存在。" }, { r: [31, 60], t: "边缘观望", d: "偶尔产生“我能行”的错觉，看到日程表幻觉立刻烟消云散。" }, { r: [61, 90], t: "攀爬工蚁", d: "对成功还有幻想。你一边嫉妒上层一边压榨自己，走在焦虑钢丝上。" }, { r: [91, 120], t: "马厩饿狼", d: "眼里没有同事只有减速带。每一封邮件都充满了扣绩效的肃杀之气。" }, { r: [121, 150], t: "掠食暴君", d: "你在重塑马厩生态。不需要睡眠只需要更多KPI。老板耽误你进步了。" }],
            B: [{ r: [0, 30], t: "棉花糖", d: "老板说左你绝不向右。HR最爱的无害耗材，遇到障碍只会原地打转。" }, { r: [31, 60], t: "受潮火柴", d: "内心有刺但不多。会在被窝里模拟怼赢领导，开会依然“您说得对”。" }, { r: [61, 90], t: "放射反骨", d: "内心藏着小尖刀。离爆发只差一个报销单。同事能感觉到你的毁灭气息。" }, { r: [91, 120], t: "自毁核弹", d: "离职信就在指尖。老板和你说话时，通常需要穿上心理防弹背心。" }, { r: [121, 150], t: "公司终结者", d: "存在的意义就是测试劳动法底线。你只想带走整家公司。" }]
        };

        let currentStep = 0;
        let scores = { W: 0, P: 0, A: 0, B: 0 };
        const statusPhrases = ["评估马蹄磨损...", "简历水分脱干...", "探测脊梁骨残余...", "评估背锅潜力...", "同步HR黑名单..."];

        function startQuiz() {
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const data = quizData[currentStep];
            document.getElementById('step-info').innerText = `RECORD: ${String(currentStep + 1).padStart(2, '0')}/30`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('funny-status').innerText = statusPhrases[Math.floor(Math.random() * statusPhrases.length)];
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn animate-fade-in font-mono";
                btn.innerText = opt.t;
                btn.onclick = () => handleSelect(opt.v);
                container.appendChild(btn);
            });

            document.getElementById('progress-fill').style.width = `${(currentStep / quizData.length) * 100}%`;
        }

        function handleSelect(val) {
            for (let key in val) scores[key] += val[key];
            currentStep++;
            if (currentStep < quizData.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            window.scrollTo(0,0);

            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            const primaryKey = sorted[0][0];
            const secondaryKey = sorted[1][0];
            const roleGroup = resultsMap[primaryKey];
            const result = roleGroup[secondaryKey] || roleGroup[primaryKey];

            document.getElementById('result-tagline').innerText = result.title + " | " + result.tagline;
            document.getElementById('result-quote').innerText = `“${result.quote}”`;
            document.getElementById('result-desc').innerText = result.desc;

            const analysisContainer = document.getElementById('dimension-analysis');
            analysisContainer.innerHTML = '';
            
            const labelsMap = { W: '耗材潜力 (W)', P: '摸鱼系数 (P)', A: '卷王指标 (A)', B: '风险评估 (B)' };
            ['W', 'P', 'A', 'B'].forEach(dim => {
                const score = scores[dim];
                const tierList = dimensionEval[dim];
                const tier = tierList.find(e => score >= e.r[0] && score <= e.r[1]) || tierList[4];
                
                const div = document.createElement('div');
                div.className = "analysis-card animate-fade-in";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-gray-500 font-mono uppercase">${labelsMap[dim]}</span>
                        <span class="text-sm text-purple-400 font-bold">${tier.t} [${score}]</span>
                    </div>
                    <div class="h-1.5 bg-gray-900 w-full mb-3 rounded-full">
                        <div class="h-full bg-purple-700 rounded-full" style="width: ${Math.min(100, (score/150)*100)}%"></div>
                    </div>
                    <p class="text-[13px] text-gray-400 font-mono italic">${tier.d}</p>
                `;
                analysisContainer.appendChild(div);
            });

            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['耗材', '摸鱼', '卷王', '风险'],
                    datasets: [{
                        data: [scores.W, scores.P, scores.A, scores.B],
                        backgroundColor: 'rgba(188, 19, 254, 0.2)',
                        borderColor: '#bc13fe',
                        pointBackgroundColor: '#00ff41',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: '#333' },
                            grid: { color: '#333' },
                            pointLabels: { color: '#888', font: { size: 12, family: 'Share Tech Mono' } },
                            ticks: { display: false },
                            suggestedMin: 0
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function copyShare() {
            const text = `2026 NMTI 录用判定：[${document.getElementById('result-tagline').innerText}]。推荐入厩等级：SSS。#职场牛马录用系统`;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const btn = event.currentTarget;
            const original = btn.innerText;
            btn.innerText = "[ 档案已同步至剪贴板 ]";
            setTimeout(() => btn.innerText = original, 2000);
        }
    </script>
