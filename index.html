<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 NMBI 职场牛马属性采样(终极全量版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --bg-dark: #050505;
            --card-gray: #121212;
        }

        body {
            background-color: var(--bg-dark);
            color: #eee;
            font-family: 'Share Tech Mono', 'ZCOOL KuaiLe', sans-serif;
            overflow-x: hidden;
            user-select: none;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .glitch-text {
            text-shadow: 2px 0 var(--neon-red), -2px 0 var(--neon-purple);
            animation: glitch 2s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--neon-red), -2px 0 var(--neon-purple); }
            50% { text-shadow: -2px 0 var(--neon-green), 2px 0 var(--neon-red); }
            100% { text-shadow: 2px 0 var(--neon-purple), -2px 0 var(--neon-green); }
        }

        .option-btn {
            position: relative;
            background: var(--card-gray);
            border: 1px solid #333;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .option-btn:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            transform: scale(1.02);
            color: var(--neon-purple);
        }

        .progress-bar {
            height: 4px;
            background: #222;
        }

        .progress-fill {
            height: 100%;
            background: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
            transition: width 0.3s ease;
        }

        .result-card {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid var(--neon-purple);
        }

        .hidden { display: none; }
        
        /* 自定义滚动条 */
        #options-container::-webkit-scrollbar { width: 4px; }
        #options-container::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>

    <div class="crt-overlay"></div>

    <div id="app" class="w-full max-w-md">

                </div>

                <div class="space-y-4">

                    </div>
                    <p id="result-desc" class="text-xs text-gray-400 leading-relaxed">

            </div>

        const resultsMap = {
            'A': { 'A': { title: "卷王之王", tagline: "ENTJ - 降本增效收割机", quote: "你不干有的是人干，你不死有的是人想让你死。", desc: "你的血液里流淌着KPI。对他人的宽容就是对竞争力的亵渎，你是办公室里唯一的猎食者。" }, 'B': { title: "搅屎棍本棍", tagline: "ENTP - 忽悠界的顶级闭环", quote: "这个需求我不做，但我能把你忽悠瘸了。", desc: "只要不让你动手干活，你的创意能绕地球三圈。你存在的意义就是让所有人的计划都乱套。" }, 'W': { title: "KPI收割机", tagline: "ESTJ - 资本重装耗材", quote: "没有完成不了的指标，只有还没累死的下属。", desc: "你是老板最得力的监军。不仅对自己狠，对下属的生命体征也持怀疑态度。" }, 'P': { title: "表演型牛马", tagline: "ESFP - 赛博奥斯卡影帝", quote: "只要镜头一开，我就是全公司最努力的崽。", desc: "你的工作产出主要集中在朋友圈和PPT的动画效果上。演技是你在马厩里存活的核心科技。" } },
            'W': { 'W': { title: "流程丧尸", tagline: "ISTJ - 规则的殉道者", quote: "少一根对齐线，我就要跟你同归于尽。", desc: "你已经把灵魂献祭给了Excel和流程图。你是公司最稳定的齿轮，直到世界尽头你也会按时打卡。" }, 'A': { title: "职场居委会", tagline: "ESFJ - 碎掉的人际缝合怪", quote: "一边在茶水间听八卦，一边在群里发收到。", desc: "你是办公室的润滑油。哪里有矛盾哪里就有你，哪里有锅你就在哪里微笑。" }, 'P': { title: "职场义庄领工", tagline: "ISFJ - 全天候背锅圣体", quote: "老板扇我左脸，我会问他手疼不疼。", desc: "你的善良在公司里显得格格不入。你是最后的屏障，专门收留那些没人要的杂活和黑锅。" }, 'B': { title: "传销头目", tagline: "ENFJ - 梦想窒息者", quote: "为了老板的豪车梦想，大家手拉手窒息！", desc: "你擅长用梦想把大家卷在一起。只要你的嗓门够大，大家就忘了结节的存在。" } },
            'P': { 'P': { title: "带薪尸体", tagline: "INTP - 精神离职大师", quote: "精神已离职，肉体在挂机。", desc: "你已经掌握了跨维度摸鱼技术。身体虽然坐在工位上，但灵魂已经在三体星系流浪。" }, 'W': { title: "职场通灵人", tagline: "INFJ - 孤独的补网员", quote: "我一眼看穿了底色，还得微笑着修补烂网。", desc: "你看透了一切画饼，但由于道德感太强，依然在深夜默默改着那个没人看的方案。" }, 'B': { title: "蹦迪的燃料", tagline: "ENFP - 情绪极度不稳定体", quote: "上午：我有100个创意！下午：我要氧气瓶。", desc: "你在“哈哈哈”和“呜呜呜”之间无缝切换。你是工位的气氛组，也是公司消耗最快的电池。" }, 'A': { title: "工位艺术尸", tagline: "ISFP - 唯美摸鱼大师", quote: "表面在做图，实际在神游。", desc: "你拒绝任何洗脑，只在自己的一亩三分地里优雅地腐烂。老板问进度，你就发乱码。" } },
            'B': { 'B': { title: "赛博独行侠", tagline: "ISTP - 键盘武器专家", quote: "再哔哔一句，我就把键盘塞你嗓子眼。", desc: "你眼里没有领导，只有逻辑和工具。活你可以干，逼老板最好少装，否则离职信随时在草稿箱准备发送。" }, 'A': { title: "职场悍匪", tagline: "ESTP - 利益突击手", quote: "只要提成够，老板是我舅。", desc: "你不在乎什么企业文化。哪里有提成哪里就有你，干完这票你随时准备跳槽。" }, 'P': { title: "赛博判官", tagline: "INTJ - 冷血架构师", quote: "别谈人性，你是来上班还是来找爹的？", desc: "你是最高效的降本增效机器。任何浪费时间的人类活动在你眼里都是系统冗余。" }, 'W': { title: "内耗冠军", tagline: "INFP - 职场自愈系祭品", quote: "老板刚才没发表情包，我想好了孩子埋哪儿。", desc: "你每天都在脑内剧场杀青一百次。工作还没开始，你的精神已经碎成了渣。" } }
        };

        let currentStep = 0;
        let scores = { W: 0, P: 0, A: 0, B: 0 };
        const statusPhrases = ["正在剥离灵魂...", "正在计算结节...", "正在分析饼图...", "正在同步档案...", "正在格式化良知...", "正在注入鸡血...", "即将生成判决...", "正在黑入人力资源系统...", "正在评估摸鱼深度..."];

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const data = quizData[currentStep];
            document.getElementById('step-counter').innerText = `STEP: ${String(currentStep + 1).padStart(2, '0')}/${String(quizData.length).padStart(2, '0')}`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('funny-status').innerText = statusPhrases[Math.floor(Math.random() * statusPhrases.length)];
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full p-3 text-left text-sm rounded-lg";
                btn.innerText = opt.t;
                btn.onclick = () => handleSelect(opt.v);
                container.appendChild(btn);
            });

            document.getElementById('progress-fill').style.width = `${((currentStep) / quizData.length) * 100}%`;
            container.scrollTop = 0;
        }

        function handleSelect(val) {
            for (let key in val) scores[key] += val[key];
            currentStep++;
            if (currentStep < quizData.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            const primary = sorted[0][0];
            const secondary = sorted[1][0];

            const result = resultsMap[primary][secondary];

            document.getElementById('result-title').innerText = result.title;
            document.getElementById('result-tagline').innerText = result.tagline;
            document.getElementById('result-quote').innerText = `“${result.quote}”`;
            document.getElementById('result-desc').innerText = result.desc;

            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['耗材度(W)', '虚无度(P)', '卷王度(A)', '戾气度(B)'],
                    datasets: [{
                        data: [scores.W, scores.P, scores.A, scores.B],
                        backgroundColor: 'rgba(188, 19, 254, 0.2)',
                        borderColor: '#bc13fe',
                        pointBackgroundColor: '#00ff41',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: '#333' },
                            grid: { color: '#333' },
                            pointLabels: { color: '#888', font: { size: 10 } },
                            ticks: { display: false },
                            suggestedMin: 0
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function copyShare() {
            const text = `我竟然是NMBI中的[${document.getElementById('result-title').innerText}]！2026职场牛马鉴定报告已生成。快来测测你的结节指数...`;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const btn = event.currentTarget;
            const original = btn.innerText;
            btn.innerText = "[ 已复制文案 ]";
            setTimeout(() => btn.innerText = original, 2000);
        }
    </script>
